<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0f0e1e"/>
    </linearGradient>
    <linearGradient id="glyph" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <!-- Subtle inner glow for depth -->
    <radialGradient id="glow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#4c1d95" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="1024" height="1024" rx="230" ry="230" fill="url(#bg)"/>
  <!-- Inner glow -->
  <rect width="1024" height="1024" rx="230" ry="230" fill="url(#glow)"/>

  <!-- Stylized "H" glyph made of pill-shaped connectors -->
  <!-- Left vertical bar -->
  <rect x="248" y="252" width="118" height="520" rx="59" fill="url(#glyph)"/>
  <!-- Right vertical bar -->
  <rect x="658" y="252" width="118" height="520" rx="59" fill="url(#glyph)"/>
  <!-- Crossbar (slightly above center, pill-shaped) -->
  <rect x="248" y="453" width="528" height="118" rx="59" fill="url(#glyph)"/>

  <!-- Small accent dots at bar ends — suggest connector terminals -->
  <circle cx="307" cy="252" r="38" fill="#c4b5fd" opacity="0.85"/>
  <circle cx="717" cy="252" r="38" fill="#c4b5fd" opacity="0.85"/>
  <circle cx="307" cy="772" r="38" fill="#c4b5fd" opacity="0.85"/>
  <circle cx="717" cy="772" r="38" fill="#c4b5fd" opacity="0.85"/>
</svg>
