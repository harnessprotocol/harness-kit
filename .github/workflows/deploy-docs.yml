name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
      - 'functions/**'
      - '.github/workflows/deploy-docs.yml'
    tags-ignore:
      - '**'
  release:
    types: [published]

permissions:
  contents: read

concurrency:
  group: pages-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          package_json_file: website/package.json

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: website/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: website
        run: pnpm install --frozen-lockfile

      - name: Build
        working-directory: website
        run: pnpm run build

      - name: Deploy preview
        if: github.event_name == 'push'
        working-directory: website
        run: pnpm dlx wrangler@latest pages deploy out --project-name=harness-kit-docs --branch=preview
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy production
        if: github.event_name == 'release'
        working-directory: website
        run: pnpm dlx wrangler@latest pages deploy out --project-name=harness-kit-docs --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
