name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Validate plugin & marketplace manifests
        # Single source of truth shared with the Release gate (scripts/validate-manifests.sh):
        # JSON parse, version alignment, registration, x-developed-with, requires.env,
        # Protocol schema, SKILL.md frontmatter, README badge count.
        run: bash scripts/validate-manifests.sh

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build CLI
        run: pnpm turbo run build --filter=@harness-kit/cli...

      - name: Scan all plugins
        id: scan
        run: |
          FAILED=0
          SUMMARY=""

          for plugin_dir in plugins/*/; do
            plugin_name=$(basename "$plugin_dir")

            # Validate plugin_name to prevent markdown injection in $GITHUB_STEP_SUMMARY
            if ! echo "$plugin_name" | grep -qE '^[a-zA-Z0-9_-]+$'; then
              echo "::warning::Skipping plugin with unexpected name: $plugin_name"
              continue
            fi

            # Run scan; exit 1 = critical findings, exit 0 = passed or warnings
            if output=$(node apps/cli/dist/index.js scan "$plugin_dir" 2>&1); then
              status="passed"
            else
              status="failed"
              FAILED=1
            fi

            # Extract counts from formatter output (titles: "Critical Issues (N)", "Warnings (N)")
            # Validate extracted values are integers before interpolating into markdown
            raw_critical=$(echo "$output" | grep -oP 'Critical Issues \(\K[0-9]+' || true)
            raw_warnings=$(echo "$output" | grep -oP 'Warnings \(\K[0-9]+' || true)
            critical=$(echo "${raw_critical:-0}" | grep -oE '^[0-9]+$' || echo "0")
            warnings=$(echo "${raw_warnings:-0}" | grep -oE '^[0-9]+$' || echo "0")

            SUMMARY="${SUMMARY}\n| ${plugin_name} | ${status} | ${critical} | ${warnings} |"
            echo "--- ${plugin_name}: ${status} (critical=${critical}, warnings=${warnings}) ---"
          done

          # Write summary table to job summary
          {
            echo "## Security Scan Results"
            echo ""
            echo "| Plugin | Status | Critical | Warnings |"
            echo "| ------ | ------ | -------- | -------- |"
            echo -e "$SUMMARY"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$FAILED" -eq 1 ]; then
            echo "::error::One or more plugins have critical security findings. Review the scan output above."
            exit 1
          fi

  test-all:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # The website imports a static marketplace JSON generated from git (gitignored
      # build output). Generate it before the website build runs in the turbo graph.
      - name: Generate marketplace data
        run: |
          pnpm --filter @harness-kit/shared --filter @harness-kit/core build
          pnpm --filter @harness-kit/marketplace-data generate --strict

      - name: Build and test all packages
        run: pnpm turbo run build test

  core-build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run dependency audit
        run: pnpm audit --audit-level=critical

      - name: Build and test core stack
        run: pnpm turbo run build test --filter=@harness-kit/cli...

  desktop-build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install system dependencies (Tauri v2)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Rust check (desktop backend)
        run: cargo check
        working-directory: apps/desktop/src-tauri

      - name: Rust clippy (desktop backend)
        run: cargo clippy -- -D warnings
        working-directory: apps/desktop/src-tauri

      - name: Rust test (desktop backend)
        run: cargo test
        working-directory: apps/desktop/src-tauri

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace dependencies
        run: |
          pnpm --filter @harness-kit/shared build
          pnpm --filter @harness-kit/core build

      - name: TypeScript check (desktop)
        run: pnpm --filter harness-kit-desktop exec tsc --noEmit

      # Catches the ffc019d class of bug: a command invoked from the frontend with
      # no allow-* capability entry — works in `tauri dev`, fails in the packaged build.
      - name: Check Tauri capability coverage
        run: pnpm --filter harness-kit-desktop check:capabilities

      - name: Run desktop tests
        run: pnpm --filter harness-kit-desktop test

      - name: Build board-server (mirrors tauri beforeBuildCommand)
        run: pnpm --filter board-server build

      - name: Build desktop frontend
        run: pnpm --filter harness-kit-desktop exec vite build

      # Smoke the *production* bundle (vite preview), not the dev server: catches
      # blank-screen / broken-lazy-chunk regressions that only appear in the built app.
      - name: Install Playwright browser (chromium)
        run: pnpm --filter harness-kit-desktop exec playwright install --with-deps chromium

      - name: Production-build smoke (blank-screen guard)
        run: pnpm --filter harness-kit-desktop test:e2e:preview

  board-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build board-server
        run: pnpm --filter board-server build

      - name: Start board-server (smoke test)
        run: node packages/board-server/dist/index.js &
        working-directory: .

      - name: Wait for board-server to be ready
        run: |
          for i in $(seq 1 10); do
            if curl -sf http://localhost:4800/health; then
              echo "board-server is up"
              exit 0
            fi
            sleep 1
          done
          echo "board-server did not start in time"
          exit 1

      - name: Kill board-server
        if: always()
        run: kill $(lsof -ti:4800) 2>/dev/null || true


  docs-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          package_json_file: website/package.json

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            website/pnpm-lock.yaml

      # Generate the static marketplace JSON the website consumes. Runs from the
      # repo root with a filtered install so we pull only the generator and its
      # workspace deps (core/shared) — not the heavy monorepo — before the website
      # is installed in isolation.
      - name: Generate marketplace data
        run: |
          pnpm install --filter "@harness-kit/marketplace-data..." --frozen-lockfile
          pnpm --filter @harness-kit/shared --filter @harness-kit/core build
          pnpm --filter @harness-kit/marketplace-data generate --strict

      - name: Install dependencies
        working-directory: website
        run: pnpm install --frozen-lockfile

      - name: Build docs
        working-directory: website
        run: pnpm run build
