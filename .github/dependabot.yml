version: 2
updates:
  # GitHub Actions — weekly is fine, these move slowly
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 2
    groups:
      actions:
        patterns:
          - "*"

  # Root pnpm workspace — covers all workspace packages via shared lockfile
  # (apps/board, apps/cli, apps/desktop, apps/marketplace, packages/*, evals/fixtures, etc.)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 3
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    groups:
      npm_and_yarn:
        patterns:
          - "*"

  # website — standalone pnpm-lock.yaml, must be listed separately
  - package-ecosystem: "npm"
    directory: "/website"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 2
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    groups:
      npm_and_yarn:
        patterns:
          - "*"

  # Rust / Tauri desktop
  - package-ecosystem: "cargo"
    directory: "/apps/desktop/src-tauri"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 2
    groups:
      cargo:
        patterns:
          - "*"

  # Python evals — weekly, low churn
  - package-ecosystem: "pip"
    directory: "/evals"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 1
    groups:
      pip:
        patterns:
          - "*"
