version: 2
updates:
  # GitHub Actions — weekly is fine, these move slowly
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 2
    groups:
      actions:
        patterns:
          - "*"

  # Root pnpm workspace — covers ALL workspace packages via the shared root lockfile,
  # including website/ (a member of pnpm-workspace.yaml: apps/*, packages/*, website).
  # website/pnpm-lock.yaml is vestigial — pnpm resolves website against the root
  # lockfile — so website is intentionally NOT a separate npm ecosystem. Adding one
  # produces broken PRs that touch website/package.json without updating the root lock.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 3
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    groups:
      npm_and_yarn:
        patterns:
          - "*"

  # Rust / Tauri desktop
  - package-ecosystem: "cargo"
    directory: "/apps/desktop/src-tauri"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 2
    groups:
      cargo:
        patterns:
          - "*"

  # Python evals — weekly, low churn
  - package-ecosystem: "pip"
    directory: "/evals"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 1
    groups:
      pip:
        patterns:
          - "*"
