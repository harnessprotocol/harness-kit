# Research & Knowledge profile — a kind:profile harness.yaml (Harness Protocol v1).
# Extend it from a project harness.yaml:
#   extends:
#     - source: ./profiles/research-knowledge.yaml
$schema: https://harnessprotocol.ai/schema/v1/harness.schema.json
version: "1"
kind: profile

metadata:
  name: research-knowledge
  description: >-
    Research, learning, and knowledge management — for technical writers,
    analysts, and anyone building a compounding knowledge base from diverse
    sources.
  author:
    name: harnessprotocol
  version: 0.2.0
  tags: [research, knowledge, writing]

plugins:
  - name: research
    source: harnessprotocol/harness-kit
    version: 0.5.0
    description: Process any source into a compounding knowledge base
  - name: orient
    source: harnessprotocol/harness-kit
    version: 0.2.0
    description: Topic-focused session orientation
  - name: capture
    source: harnessprotocol/harness-kit
    version: 0.4.0
    description: Capture session insights for later reflection
  - name: explain
    source: harnessprotocol/harness-kit
    version: 0.2.0
    description: Layered code explanations
  - name: docgen
    source: harnessprotocol/harness-kit
    version: 0.2.0
    description: Generate or update documentation
  # Memory backend for the research-methodology / knowledge-taxonomy notes
  # this role accrues (replaces the old out-of-spec `knowledge: memory-md`).
  - name: membrain
    source: harnessprotocol/harness-kit
    version: 0.1.0
    description: Graph-based agent memory

# Web fetching for source-gathering during research.
mcp-servers:
  fetch:
    transport: stdio
    command: uvx
    args: ["mcp-server-fetch"]

instructions:
  operational: |
    - Always cite sources when adding to the knowledge base.
    - Capture session insights before ending long research sessions.
    - Orient at the start of each session to build on prior work.
    - Keep research-methodology and knowledge-taxonomy notes in memory.
